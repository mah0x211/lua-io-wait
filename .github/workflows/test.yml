name: test

on:
  push:
    paths-ignore:
    - '**.md'
    - 'LICENSE'

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/mah0x211/lua-ci:latest
    strategy:
      matrix:
        lua-version:
          - "5.1.:latest"
          - "5.2.:latest"
          - "5.3.:latest"
          - "5.4.:latest"
          - "lj-v2.1:latest"
    steps:
    -
      name: Checkout
      uses: actions/checkout@v2
      with:
        submodules: 'true'
    -
      name: Switch Lua Version
      run: |
        lenv -g use ${{ matrix.lua-version }}
        lua -v || true
    -
      name: Install
      run: |
        IO_WAIT_COVERAGE=1 luarocks make
    -
      name: Install Tools
      run: |
        luarocks install assert
        luarocks install time-clock
        luarocks install os-pipe
        luarocks install fork
    -
      name: Run Test
      run: |
        lua ./test/wait_test.lua
    -
      name: Generate coverage reports
      run: |
        sh ./covgen.sh
    -
      name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        flags: unittests
